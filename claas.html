<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claas - ProSa Circular Economy</title>
    <link rel="stylesheet" href="common.css">
    <style>
        /* Page-specific styles */
        .formula-display {
            background-color: #fff9e6;
            border: 2px solid #ffe082;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 1.1rem;
            color: #333;
            text-align: center;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <header class="page-header">
        <div class="header-content">
            <div class="header-left">
                <h1 class="header-title">ProSa Circular Economy</h1>
                <span class="participant-badge">Claas</span>
            </div>
            <div class="header-buttons">
                <button class="header-btn" onclick="navigateToHome()">Home</button>
                <button class="header-btn secondary" onclick="handleLogout()">Abmelden</button>
            </div>
        </div>
    </header>

    <main class="main-container">
        <h1 class="page-title">Claas</h1>

        <form id="claasForm">
            <!-- Halbzeug Information Section -->
            <section class="section-card">
                <h2 class="section-title">Halbzeug Information</h2>
                
                <div class="grid-2">
                    <div class="form-group">
                        <label class="form-label" for="halbzeug">Halbzeug</label>
                        <input type="text" id="halbzeug" name="halbzeug" class="form-input" 
                               placeholder="Stüli Claas" value="Stüli Claas">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="mengeHalbzeug">Menge Halbzeug</label>
                        <input type="number" id="mengeHalbzeug" name="mengeHalbzeug" 
                               class="form-input" placeholder="Menge eingeben" min="0" step="0.01">
                    </div>
                </div>
            </section>

            <!-- Upload Stückliste Section -->
            <section class="section-card upload-section">
                <h2 class="section-title">Stückliste</h2>
                <button type="button" class="upload-button" id="uploadStuecklisteBtn">
                    Upload Stückliste
                </button>
                <div class="upload-area" id="uploadStuecklisteArea">
                    <div class="upload-placeholder">Datei hier ablegen oder klicken zum Hochladen</div>
                </div>
            </section>

            <!-- Upload Arbeitsplan Section -->
            <section class="section-card upload-section">
                <h2 class="section-title">Arbeitsplan</h2>
                <button type="button" class="upload-button" id="uploadArbeitsplanBtn">
                    Upload Arbeitsplan
                </button>
                <div class="upload-area" id="uploadArbeitsplanArea">
                    <div class="upload-placeholder">Datei hier ablegen oder klicken zum Hochladen</div>
                </div>
            </section>

            <!-- Group 1: Hausnorm EJOT -->
            <section class="data-group group-1">
                <h2 class="group-title">Hausnorm EJOT</h2>
                
                <div class="data-row">
                    <label class="row-label" for="chemischeWerte1">Chemische Werte</label>
                    <div class="row-value">
                        <input type="text" id="chemischeWerte1" name="chemischeWerte1" 
                               class="form-input" placeholder="Chemische Werte eingeben">
                    </div>
                </div>
                
                <div class="data-row">
                    <label class="row-label" for="mechanischeWerte1">Mechanische Werte</label>
                    <div class="row-value">
                        <input type="text" id="mechanischeWerte1" name="mechanischeWerte1" 
                               class="form-input" placeholder="Mechanische Werte eingeben">
                    </div>
                </div>
            </section>

            <!-- Group 2: Hausnorm Claas -->
            <section class="data-group group-2">
                <h2 class="group-title">Hausnorm Claas</h2>
                
                <div class="data-row">
                    <label class="row-label" for="chemischeWerte2">Chemische Werte</label>
                    <div class="row-value">
                        <input type="text" id="chemischeWerte2" name="chemischeWerte2" 
                               class="form-input" placeholder="Chemische Werte eingeben">
                    </div>
                </div>
                
                <div class="data-row">
                    <label class="row-label" for="mechanischeWerte2">Mechanische Werte</label>
                    <div class="row-value">
                        <input type="text" id="mechanischeWerte2" name="mechanischeWerte2" 
                               class="form-input" placeholder="Mechanische Werte eingeben">
                    </div>
                </div>
            </section>
        </form>
    </main>

    <!-- Action Bar for Save/Cancel -->
    <div class="action-bar hidden">
        <button class="btn btn-success" onclick="window.formManager.saveData()">
            💾 Speichern
        </button>
        <button class="btn btn-secondary" onclick="location.reload()">
            ↺ Zurücksetzen
        </button>
    </div>

    <footer class="page-footer">
        <div class="footer-content">
            <p class="footer-text">© 2025 ProSa Circular Economy Project. All rights reserved.</p>
        </div>
    </footer>

    <script src="common.js"></script>
    <script>
        // Page-specific initialization
        document.addEventListener('DOMContentLoaded', function() {
            // Initialize form manager
            window.formManager = new FormDataManager('claasForm', 'claas');
            
            // Initialize file upload handlers
            window.stuecklisteUpload = new FileUploadHandler(
                'uploadStuecklisteBtn',
                'uploadStuecklisteArea',
                {
                    acceptedTypes: ['.pdf', '.xlsx', '.xls', '.csv', '.doc', '.docx'],
                    maxSize: 15 * 1024 * 1024, // 15MB
                    onFileSelect: (file) => {
                        console.log('Stückliste uploaded:', file.name);
                        showMessage('Stückliste erfolgreich hochgeladen', 'success');
                    },
                    onFileRemove: () => {
                        console.log('Stückliste removed');
                        showMessage('Stückliste entfernt', 'info');
                    }
                }
            );
            
            window.arbeitsplanUpload = new FileUploadHandler(
                'uploadArbeitsplanBtn',
                'uploadArbeitsplanArea',
                {
                    acceptedTypes: ['.pdf', '.xlsx', '.xls', '.csv', '.doc', '.docx'],
                    maxSize: 15 * 1024 * 1024, // 15MB
                    onFileSelect: (file) => {
                        console.log('Arbeitsplan uploaded:', file.name);
                        showMessage('Arbeitsplan erfolgreich hochgeladen', 'success');
                    },
                    onFileRemove: () => {
                        console.log('Arbeitsplan removed');
                        showMessage('Arbeitsplan entfernt', 'info');
                    }
                }
            );
            
            // Enable auto-save (every 30 seconds)
            enableAutoSave(window.formManager, 30000);
        });
    </script>
</body>
</html>
