<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DHI - ProSa Circular Economy</title>
    <link rel="stylesheet" href="common.css">
    <style>
        /* Page-specific table styles */
        .dhi-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            background-color: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
        }
        
        .dhi-table thead th {
            padding: 15px;
            text-align: center;
            font-weight: 600;
            font-size: 0.95rem;
            color: white;
        }
        
        .dhi-table thead th:first-child {
            background-color: #2d8659;
        }
        
        .dhi-table thead th:nth-child(2) {
            background-color: #ff8c00;
        }
        
        .dhi-table thead th:nth-child(3) {
            background-color: #1976d2;
        }
        
        .dhi-table thead th:nth-child(4) {
            background-color: #c2185b;
        }
        
        .dhi-table tbody td {
            padding: 12px 15px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .dhi-table tbody tr:last-child td {
            border-bottom: none;
        }
        
        /* Rohmaterial column */
        .dhi-table tbody td:first-child {
            background-color: #e8f5e9;
            font-weight: 600;
            color: #1a6b4a;
        }
        
        /* Bedarfsmenge column – read-only */
        .dhi-table tbody td:nth-child(2) {
            background-color: #fff3e0;
        }
        .dhi-table .cell-readonly {
            display: inline-block;
            width: 100%;
            padding: 8px;
            background-color: #f5f5f5;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            color: #555;
            font-size: 0.95rem;
            min-height: 36px;
        }
        
        .dhi-table tbody td:nth-child(3) {
            background-color: #e3f2fd;
        }
        
        .dhi-table tbody td:nth-child(4) {
            background-color: #fce4ec;
        }
        
        .dhi-table input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background-color: white;
            text-align: center;
        }
        
        .dhi-table input:focus {
            outline: none;
            border-color: #2d8659;
            box-shadow: 0 0 0 2px rgba(45, 134, 89, 0.2);
        }

        .dhi-table .fehlmenge-display {
            display: inline-block;
            width: 100%;
            padding: 8px;
            border-radius: 4px;
            font-weight: 600;
            text-align: center;
            min-height: 36px;
            border: 1px solid transparent;
        }
        .dhi-table .fehlmenge-display.shortage {
            background-color: #ffebee;
            color: #c62828;
            border-color: #ef9a9a;
        }
        .dhi-table .fehlmenge-display.ok {
            background-color: #e8f5e9;
            color: #2e7d32;
            border-color: #a5d6a7;
        }
        
        @media (max-width: 768px) {
            .dhi-table {
                font-size: 0.85rem;
            }
            
            .dhi-table thead th,
            .dhi-table tbody td {
                padding: 8px 6px;
            }
            
            .dhi-table input {
                padding: 6px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <header class="page-header">
        <div class="header-content">
            <div class="header-left">
                <h1 class="header-title">ProSa Circular Economy</h1>
                <span class="participant-badge">DHI</span>
            </div>
            <div class="header-buttons">
                <button class="header-btn" onclick="navigateToHome()">Home</button>
                <button class="header-btn secondary" onclick="handleLogout()">Abmelden</button>
            </div>
        </div>
    </header>

    <main class="main-container">
        <h1 class="page-title">DHI</h1>

        <form id="dhiForm">
            <section class="section-card">
                <h2 class="section-title">Schrottklassen-Übersicht</h2>
                
                <table class="dhi-table">
                    <thead>
                        <tr>
                            <th>Rohmaterial</th>
                            <th>Bedarfsmenge</th>
                            <th>Verfügbare Menge</th>
                            <th>Fehlmenge</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Schrottklasse 1</td>
                            <td><div class="cell-readonly" id="bedarfsmenge_1">-</div></td>
                            <td><input type="number" name="verfuegbar_1" id="verfuegbar_1" placeholder="0.00" step="0.01"></td>
                            <td><div class="fehlmenge-display ok" id="fehlmenge_1">-</div></td>
                        </tr>
                        <tr>
                            <td>Schrottklasse 2</td>
                            <td><div class="cell-readonly" id="bedarfsmenge_2">-</div></td>
                            <td><input type="number" name="verfuegbar_2" id="verfuegbar_2" placeholder="0.00" step="0.01"></td>
                            <td><div class="fehlmenge-display ok" id="fehlmenge_2">-</div></td>
                        </tr>
                        <tr>
                            <td>Schrottklasse 3</td>
                            <td><div class="cell-readonly" id="bedarfsmenge_3">-</div></td>
                            <td><input type="number" name="verfuegbar_3" id="verfuegbar_3" placeholder="0.00" step="0.01"></td>
                            <td><div class="fehlmenge-display ok" id="fehlmenge_3">-</div></td>
                        </tr>
                        <tr>
                            <td>Schrottklasse 4</td>
                            <td><div class="cell-readonly" id="bedarfsmenge_4">-</div></td>
                            <td><input type="number" name="verfuegbar_4" id="verfuegbar_4" placeholder="0.00" step="0.01"></td>
                            <td><div class="fehlmenge-display ok" id="fehlmenge_4">-</div></td>
                        </tr>
                        <tr>
                            <td>Schrottklasse 5</td>
                            <td><div class="cell-readonly" id="bedarfsmenge_5">-</div></td>
                            <td><input type="number" name="verfuegbar_5" id="verfuegbar_5" placeholder="0.00" step="0.01"></td>
                            <td><div class="fehlmenge-display ok" id="fehlmenge_5">-</div></td>
                        </tr>
                        <tr>
                            <td>Schrottklasse 6</td>
                            <td><div class="cell-readonly" id="bedarfsmenge_6">-</div></td>
                            <td><input type="number" name="verfuegbar_6" id="verfuegbar_6" placeholder="0.00" step="0.01"></td>
                            <td><div class="fehlmenge-display ok" id="fehlmenge_6">-</div></td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </form>
    </main>

    <!-- Always-visible Save Bar -->
    <div class="action-bar">
        <button class="btn btn-success" onclick="saveDhiData()">
            💾 Speichern
        </button>
        <button class="btn btn-secondary" onclick="location.reload()">
            ↺ Zurücksetzen
        </button>
    </div>

    <footer class="page-footer">
        <div class="footer-content">
            <p class="footer-text">© 2025 ProSa Circular Economy Project. All rights reserved.</p>
        </div>
    </footer>

    <script src="common.js"></script>
    <script>
        // Recalculate Fehlmenge = Bedarfsmenge - Verfügbare Menge for one row
        function calculateFehlmenge(i) {
            const bedarf    = parseFloat(document.getElementById(`bedarfsmenge_${i}`).dataset.value) || 0;
            const verfuegbar = parseFloat(document.getElementById(`verfuegbar_${i}`).value) || 0;
            const fehlmenge  = bedarf - verfuegbar;
            const el = document.getElementById(`fehlmenge_${i}`);

            if (bedarf === 0 && verfuegbar === 0) {
                el.textContent = '-';
                el.className = 'fehlmenge-display ok';
            } else {
                el.textContent = fehlmenge.toFixed(2);
                el.className   = 'fehlmenge-display ' + (fehlmenge > 0 ? 'shortage' : 'ok');
            }
        }

        function saveDhiData() {
            const data = {};
            for (let i = 1; i <= 6; i++) {
                data[`verfuegbar_${i}`] = document.getElementById(`verfuegbar_${i}`).value;
            }
            ProSaData.save('dhi', data);
            showSaveConfirmation();
        }

        document.addEventListener('DOMContentLoaded', function () {

            // Load Bedarfsmenge from backend key 'dhi_bedarf'
            const bedarf = ProSaData.load('dhi_bedarf');
            for (let i = 1; i <= 6; i++) {
                const el = document.getElementById(`bedarfsmenge_${i}`);
                const val = bedarf && bedarf[`bedarfsmenge_${i}`] != null
                    ? bedarf[`bedarfsmenge_${i}`] : null;
                el.textContent    = val != null ? val : '-';
                el.dataset.value  = val != null ? val : '0';
            }

            // Restore saved Verfügbare Menge
            const saved = ProSaData.load('dhi');
            if (saved) {
                for (let i = 1; i <= 6; i++) {
                    const el = document.getElementById(`verfuegbar_${i}`);
                    if (saved[`verfuegbar_${i}`] != null) el.value = saved[`verfuegbar_${i}`];
                }
            }

            // Wire up live calculation
            for (let i = 1; i <= 6; i++) {
                document.getElementById(`verfuegbar_${i}`)
                    .addEventListener('input', () => calculateFehlmenge(i));
                calculateFehlmenge(i);
            }
        });
    </script>
</body>
</html>
