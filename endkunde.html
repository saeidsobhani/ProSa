<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Endkunde - ProSa Circular Economy</title>
    <link rel="stylesheet" href="common.css">
</head>
<body>
    <header class="page-header">
        <div class="header-content">
            <div class="header-left">
                <h1 class="header-title">ProSa Circular Economy</h1>
                <span class="participant-badge">Endkunde</span>
            </div>
            <div class="header-buttons">
                <button class="header-btn" onclick="navigateToHome()">Home</button>
                <button class="header-btn secondary" onclick="handleLogout()">Abmelden</button>
            </div>
        </div>
    </header>

    <main class="main-container">
        <h1 class="page-title">Endkunde</h1>

        <!-- Endprodukt Information Section -->
        <section class="section-card">
            <h2 class="section-title">Endprodukt Information</h2>
            
            <div class="grid-2">
                <div class="form-group">
                    <label class="form-label" for="endproduktInput">Endprodukt</label>
                    <input type="text" id="endproduktInput" class="form-input"
                           placeholder="Endprodukt eingeben">
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="mengeInput">Menge</label>
                    <input type="number" id="mengeInput" class="form-input"
                           placeholder="Menge eingeben" min="0" step="1">
                </div>
            </div>
        </section>
    </main>

    <!-- Always-visible Save Bar -->
    <div class="action-bar">
        <button class="btn btn-success" onclick="saveEndkundeData()">
            💾 Speichern
        </button>
        <button class="btn btn-secondary" onclick="location.reload()">
            ↺ Zurücksetzen
        </button>
    </div>

    <footer class="page-footer">
        <div class="footer-content">
            <p class="footer-text">© 2025 ProSa Circular Economy Project. All rights reserved.</p>
        </div>
    </footer>

    <script src="common.js"></script>
    <script>
        // Page-specific initialization
        document.addEventListener('DOMContentLoaded', function() {
            loadEndkundeData();
        });

        function loadEndkundeData() {
            const data = ProSaData.load('endkunde');
            if (data) {
                if (data.endprodukt) {
                    document.getElementById('endproduktInput').value = data.endprodukt;
                }
                if (data.menge !== undefined && data.menge !== null) {
                    document.getElementById('mengeInput').value = data.menge;
                }
            }
        }

        function saveEndkundeData() {
            const endprodukt = document.getElementById('endproduktInput').value.trim();
            const mengeRaw = document.getElementById('mengeInput').value;
            const menge = mengeRaw !== '' ? parseInt(mengeRaw, 10) : null;

            if (!endprodukt) {
                showMessage('Bitte Endprodukt eingeben.', 'error');
                return;
            }
            if (menge === null || isNaN(menge) || menge < 0) {
                showMessage('Bitte eine gültige Menge (ganze Zahl ≥ 0) eingeben.', 'error');
                return;
            }

            ProSaData.save('endkunde', { endprodukt: endprodukt, menge: menge });
            showSaveConfirmation();
        }
    </script>
</body>
</html>
