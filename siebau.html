<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siebau - ProSa Circular Economy</title>
    <link rel="stylesheet" href="common.css">
</head>
<body>
    <header class="page-header">
        <div class="header-content">
            <div class="header-left">
                <h1 class="header-title">ProSa Circular Economy</h1>
                <span class="participant-badge">Siebau</span>
            </div>
            <div class="header-buttons">
                <button class="header-btn" onclick="navigateToHome()">Home</button>
                <button class="header-btn secondary" onclick="handleLogout()">Abmelden</button>
            </div>
        </div>
    </header>

    <main class="main-container">
        <h1 class="page-title">Siebau</h1>

        <form id="siebauForm">
            <!-- Endprodukt Information Section -->
            <section class="section-card">
                <h2 class="section-title">Endprodukt Information</h2>
                
                <div class="grid-2">
                    <div class="form-group">
                        <label class="form-label">Endprodukt</label>
                        <div class="display-field" id="endproduktDisplay">-</div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Menge</label>
                        <div class="display-field" id="mengeDisplay">-</div>
                    </div>
                </div>
            </section>

            <!-- Upload Stückliste Section -->
            <section class="section-card upload-section">
                <h2 class="section-title">Stückliste</h2>
                <button type="button" class="upload-button" id="uploadStuecklisteBtn">
                    Upload Stückliste
                </button>
                <div class="upload-area" id="uploadStuecklisteArea">
                    <div class="upload-placeholder">Datei hier ablegen oder klicken zum Hochladen</div>
                </div>
            </section>

            <!-- Upload Arbeitsplan Section -->
            <section class="section-card upload-section">
                <h2 class="section-title">Arbeitsplan</h2>
                <button type="button" class="upload-button" id="uploadArbeitsplanBtn">
                    Upload Arbeitsplan
                </button>
                <div class="upload-area" id="uploadArbeitsplanArea">
                    <div class="upload-placeholder">Datei hier ablegen oder klicken zum Hochladen</div>
                </div>
            </section>

            <!-- Merkmals Section -->
            <section class="section-card">
                <h2 class="section-title">Merkmale</h2>

                <div class="merkmal-header">
                    <span>Name</span>
                    <span>Wert</span>
                    <span>Einheit</span>
                    <span></span>
                </div>

                <div id="merkmalList">
                    <!-- rows injected by JS -->
                </div>

                <button type="button" class="btn btn-primary merkmal-add-btn" onclick="addMerkmalRow()">
                    + Merkmal hinzufügen
                </button>
            </section>
        </form>
    </main>

    <!-- Always-visible Save Bar -->
    <div class="action-bar">
        <button class="btn btn-success" onclick="saveSiebauData()">
            💾 Speichern
        </button>
        <button class="btn btn-secondary" onclick="location.reload()">
            ↺ Zurücksetzen
        </button>
    </div>

    <footer class="page-footer">
        <div class="footer-content">
            <p class="footer-text">© 2025 ProSa Circular Economy Project. All rights reserved.</p>
        </div>
    </footer>

    <script src="common.js"></script>
    <script>
        // Page-specific initialization
        document.addEventListener('DOMContentLoaded', function() {
            // Load read-only Endkunde data into the first section
            loadEndkundeData();

            // Restore saved merkmale (or start with one empty row)
            const saved = ProSaData.load('siebau');
            loadMerkmale(saved && saved.merkmale ? saved.merkmale : []);

            // File upload handlers
            window.stuecklisteUpload = new FileUploadHandler(
                'uploadStuecklisteBtn', 'uploadStuecklisteArea',
                {
                    acceptedTypes: ['.pdf', '.xlsx', '.xls', '.csv', '.doc', '.docx'],
                    maxSize: 15 * 1024 * 1024,
                    onFileSelect: (file) => showMessage('Stückliste erfolgreich hochgeladen', 'success'),
                    onFileRemove: () => showMessage('Stückliste entfernt', 'info')
                }
            );

            window.arbeitsplanUpload = new FileUploadHandler(
                'uploadArbeitsplanBtn', 'uploadArbeitsplanArea',
                {
                    acceptedTypes: ['.pdf', '.xlsx', '.xls', '.csv', '.doc', '.docx'],
                    maxSize: 15 * 1024 * 1024,
                    onFileSelect: (file) => showMessage('Arbeitsplan erfolgreich hochgeladen', 'success'),
                    onFileRemove: () => showMessage('Arbeitsplan entfernt', 'info')
                }
            );
        });

        /* ── Save ── */
        function saveSiebauData() {
            ProSaData.save('siebau', { merkmale: getMerkmale() });
            showSaveConfirmation();
        }

        function loadEndkundeData() {
            const data = ProSaData.load('endkunde');
            if (data) {
                document.getElementById('endproduktDisplay').textContent =
                    data.endprodukt || '-';
                document.getElementById('mengeDisplay').textContent =
                    (data.menge !== undefined && data.menge !== null) ? data.menge : '-';
            }
        }

        /* ── Merkmal dynamic rows ── */
        let merkmalCounter = 0;

        function addMerkmalRow(name = '', wert = '', einheit = '') {
            merkmalCounter++;
            const id = merkmalCounter;
            const list = document.getElementById('merkmalList');

            const row = document.createElement('div');
            row.className = 'merkmal-row';
            row.dataset.id = id;
            row.innerHTML = `
                <input type="text" class="form-input merkmal-name"
                       placeholder="Name" value="${escAttr(name)}">
                <input type="text" class="form-input merkmal-wert"
                       placeholder="Wert" value="${escAttr(wert)}">
                <input type="text" class="form-input merkmal-einheit"
                       placeholder="Einheit" value="${escAttr(einheit)}">
                <button type="button" class="btn-merkmal-remove" title="Merkmal entfernen"
                        onclick="removeMerkmalRow(${id})">✕</button>
            `;
            list.appendChild(row);
        }

        function removeMerkmalRow(id) {
            const row = document.querySelector(`.merkmal-row[data-id="${id}"]`);
            if (row) row.remove();
        }

        function getMerkmale() {
            return Array.from(document.querySelectorAll('.merkmal-row')).map(row => ({
                name:    row.querySelector('.merkmal-name').value.trim(),
                wert:    row.querySelector('.merkmal-wert').value.trim(),
                einheit: row.querySelector('.merkmal-einheit').value.trim()
            }));
        }

        function loadMerkmale(merkmale) {
            document.getElementById('merkmalList').innerHTML = '';
            merkmalCounter = 0;
            if (merkmale && merkmale.length > 0) {
                merkmale.forEach(m => addMerkmalRow(m.name, m.wert, m.einheit));
            } else {
                addMerkmalRow(); // start with one empty row
            }
        }

        function escAttr(str) {
            return String(str).replace(/"/g, '&quot;').replace(/</g, '&lt;');
        }
    </script>
</body>
</html>
